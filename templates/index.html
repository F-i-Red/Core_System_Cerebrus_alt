<!DOCTYPE html>
<html>
<head>
    <title>Cerebrus OS Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
        }

        #sidebar {
            width: 220px;
            background: #222;
            color: white;
            padding: 20px;
            height: 100vh;
        }

        #sidebar button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #444;
            color: white;
            border: none;
            cursor: pointer;
        }

        #sidebar button:hover {
            background: #666;
        }

        #content {
            flex-grow: 1;
            padding: 20px;
        }

        section {
            display: none;
        }

        pre {
            background: #f3f3f3;
            padding: 10px;
            border-radius: 5px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Cerebrus OS</h2>

    <button onclick="showSection('housing')">Housing</button>
    <button onclick="showSection('mobility')">Mobility</button>
    <button onclick="showSection('logistics')">Logistics</button>
    <button onclick="showSection('justice')">Justice</button>
    <button onclick="showSection('civic')">Civic Force</button>
    <button onclick="showSection('ecology')">Ecology</button>

    <!-- NEW BUTTON -->
    <button onclick="showSection('sustainability')">Sustainability</button>

    <button onclick="showSection('logs')">Logs</button>
</div>

<div id="content">

    <!-- HOUSING -->
    <section id="housing">
        <h2>Housing</h2>
        <button onclick="requestHousing()">Request Housing</button>
        <pre id="housing-result">–</pre>
    </section>

    <!-- MOBILITY -->
    <section id="mobility">
        <h2>Mobility</h2>
        <button onclick="requestMobility()">Request Transport</button>
        <pre id="mobility-result">–</pre>
    </section>

    <!-- LOGISTICS -->
    <section id="logistics">
        <h2>Logistics</h2>
        <button onclick="sendResidue()">Send Residue</button>
        <pre id="logistics-result">–</pre>
    </section>

    <!-- JUSTICE -->
    <section id="justice">
        <h2>Justice</h2>
        <input id="incident-id" placeholder="Incident ID" />
        <button onclick="processIncident()">Process Incident</button>
        <pre id="justice-result">–</pre>
    </section>

    <!-- CIVIC FORCE -->
    <section id="civic">
        <h2>Civic Force</h2>
        <button onclick="civicIntervention()">Trigger Intervention</button>
        <pre id="civic-result">–</pre>
    </section>

    <!-- ECOLOGY -->
    <section id="ecology">
        <h2>Ecology</h2>
        <button onclick="updateEcology()">Update Ecology</button>
        <pre id="ecology-result">–</pre>
    </section>

    <!-- SUSTAINABILITY (NEW) -->
    <section id="sustainability" style="padding:20px;">
        <h2>Sustainability Dashboard</h2>

        <div style="margin-bottom: 10px;">
            <button onclick="loadSustainabilityPanel()">Load Panel</button>
            <button onclick="loadSustainabilityActions()">Recommended Actions</button>
            <button onclick="createSustainabilityTasks()">Create Civic Tasks</button>
            <button onclick="updateSustainabilityIndicator()">Update Indicator</button>
        </div>

        <h3>Score</h3>
        <pre id="sustainability-score">–</pre>

        <h3>Indicators</h3>
        <pre id="sustainability-indicators">–</pre>

        <h3>Alerts</h3>
        <pre id="sustainability-alerts">–</pre>

        <h3>Recommended Actions</h3>
        <pre id="sustainability-actions">–</pre>

        <h3>Created Tasks</h3>
        <pre id="sustainability-tasks">–</pre>
    </section>

    <!-- LOGS -->
    <section id="logs">
        <h2>Public Logs</h2>
        <button onclick="loadLogs()">Load Logs</button>
        <pre id="logs-result">–</pre>
    </section>

</div>

<script>
function showSection(id) {
    document.querySelectorAll("section").forEach(s => s.style.display = "none");
    document.getElementById(id).style.display = "block";
}

/* HOUSING */
function requestHousing() {
    fetch("/housing/request", { method: "POST" })
        .then(r => r.json())
        .then(data => document.getElementById("housing-result").textContent = JSON.stringify(data, null, 2));
}

/* MOBILITY */
function requestMobility() {
    fetch("/mobility/request", { method: "POST" })
        .then(r => r.json())
        .then(data => document.getElementById("mobility-result").textContent = JSON.stringify(data, null, 2));
}

/* LOGISTICS */
function sendResidue() {
    fetch("/logistics/residue", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ content: "mixed residue" })
    })
    .then(r => r.json())
    .then(data => document.getElementById("logistics-result").textContent = JSON.stringify(data, null, 2));
}

/* JUSTICE */
function processIncident() {
    const id = document.getElementById("incident-id").value;
    fetch(`/justice/process/${id}`, { method: "POST" })
        .then(r => r.json())
        .then(data => document.getElementById("justice-result").textContent = JSON.stringify(data, null, 2));
}

/* CIVIC FORCE */
function civicIntervention() {
    fetch("/civic/intervention", { method: "POST" })
        .then(r => r.json())
        .then(data => document.getElementById("civic-result").textContent = JSON.stringify(data, null, 2));
}

/* ECOLOGY */
function updateEcology() {
    fetch("/ecology/update", { method: "POST" })
        .then(r => r.json())
        .then(data => document.getElementById("ecology-result").textContent = JSON.stringify(data, null, 2));
}

/* SUSTAINABILITY */
function loadSustainabilityPanel() {
    fetch("/sustainability/panel")
        .then(r => r.json())
        .then(data => {
            document.getElementById("sustainability-score").textContent = JSON.stringify(data.score, null, 2);
            document.getElementById("sustainability-indicators").textContent = JSON.stringify(data.indicators, null, 2);
            document.getElementById("sustainability-alerts").textContent = JSON.stringify(data.alerts, null, 2);
        });
}

function loadSustainabilityActions() {
    fetch("/sustainability/actions")
        .then(r => r.json())
        .then(data => document.getElementById("sustainability-actions").textContent = JSON.stringify(data, null, 2));
}

function createSustainabilityTasks() {
    fetch("/sustainability/create_tasks", { method: "POST" })
        .then(r => r.json())
        .then(data => document.getElementById("sustainability-tasks").textContent = JSON.stringify(data, null, 2));
}

function updateSustainabilityIndicator() {
    const indicator = prompt("Indicator name (e.g., renewable_energy_ratio):");
    const value = prompt("New value (0 to 1):");

    fetch(`/sustainability/update/${indicator}/${value}`, { method: "POST" })
        .then(r => r.json())
        .then(data => alert("Updated: " + JSON.stringify(data)));
}

/* LOGS */
function loadLogs() {
    fetch("/logs")
        .then(r => r.json())
        .then(data => document.getElementById("logs-result").textContent = JSON.stringify(data, null, 2));
}
</script>

</body>
</html>

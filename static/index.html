<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cerebrus OS — Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f3f3;
            padding: 20px;
        }
        h1 { color: #333; }
        button {
            padding: 10px 20px;
            margin: 10px 0;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover { background: #45a049; }
        #output {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border: 1px solid #ccc;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h1>Cerebrus OS — Interface</h1>

<button onclick="callAPI('/request_house')">Request House</button>
<button onclick="callAPI('/request_transport')">Request Transport</button>
<button onclick="callAPI('/send_residue')">Send Residue</button>
<button onclick="callAPI('/process_incident')">Process Incident</button>
<button onclick="callAPI('/civic_intervention')">Civic Force Intervention</button>
<button onclick="callAPI('/update_ecology')">Update Ecology</button>
<button onclick="callAPI('/vote')">Vote</button>
<button onclick="callAPI('/logs')">View Public Logs</button>

<div id="output">Results will appear here...</div>

<script>
    function callAPI(endpoint) {
        fetch(endpoint)
            .then(response => response.json())
            .then(data => {
                document.getElementById("output").textContent =
                    JSON.stringify(data, null, 2);
            })
            .catch(err => {
                document.getElementById("output").textContent =
                    "Error: " + err;
            });
    }
</script>

</body>
</html>
